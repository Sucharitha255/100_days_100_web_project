<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookShelf - Personal Library</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="dark-mode">
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block sidebar collapse">
          <div class="position-sticky pt-3">
            <div class="d-flex align-items-center px-3 mb-4">
              <i class="bi bi-book me-2 fs-3 text-primary"></i>
              <h4 class="text-light">BookShelf</h4>
            </div>
            <ul class="nav flex-column">
              <li class="nav-item">
                <a
                  href="#"
                  onclick="showSection('library')"
                  class="nav-link active"
                  id="nav-library"
                  ><i class="bi bi-bookshelf me-2"></i> Library</a
                >
              </li>
              <li class="nav-item">
                <a
                  href="#"
                  onclick="showSection('dashboard')"
                  class="nav-link"
                  id="nav-dashboard"
                  ><i class="bi bi-graph-up me-2"></i> Dashboard</a
                >
              </li>
              <li class="nav-item">
                <a
                  href="#"
                  onclick="showSection('goals')"
                  class="nav-link"
                  id="nav-goals"
                  ><i class="bi bi-target me-2"></i> Goals</a
                >
              </li>
              <li class="nav-item">
                <a
                  href="#"
                  onclick="showSection('borrowed')"
                  class="nav-link"
                  id="nav-borrowed"
                  ><i class="bi bi-arrow-left-right me-2"></i> Borrowed/Lent</a
                >
              </li>
            </ul>
          </div>
        </nav>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
          <nav class="navbar navbar-dark border-bottom">
            <div class="container-fluid">
              <button
                class="navbar-toggler d-md-none"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#sidebar"
              >
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="d-flex align-items-center w-100">
                <input
                  type="text"
                  id="searchInput"
                  class="form-control me-3 bg-dark text-light border-secondary"
                  placeholder="Search books..."
                  onkeyup="filterBooks()"
                />
                <button
                  class="btn btn-primary me-2"
                  data-bs-toggle="modal"
                  data-bs-target="#bookModal"
                  onclick="resetBookForm()"
                >
                  <i class="bi bi-plus-circle"></i> Add Book
                </button>
                <button class="btn btn-outline-light" onclick="exportLibrary()">
                  <i class="bi bi-download"></i>
                </button>
              </div>
            </div>
          </nav>

          <!-- Library Section -->
          <div id="library-section" class="section">
            <div
              class="d-flex justify-content-between align-items-center pt-4 pb-3"
            >
              <h2 class="text-light">My Library</h2>
              <div class="d-flex gap-2">
                <select
                  id="sortSelect"
                  class="form-select form-select-sm bg-dark text-light border-secondary"
                  onchange="filterBooks()"
                >
                  <option value="title">Sort by Title</option>
                  <option value="author">Sort by Author</option>
                  <option value="date">Sort by Date Added</option>
                  <option value="status">Sort by Status</option>
                </select>
                <div class="btn-group">
                  <button
                    class="btn btn-outline-secondary btn-sm"
                    onclick="filterByStatus('all')"
                  >
                    All
                  </button>
                  <button
                    class="btn btn-outline-secondary btn-sm"
                    onclick="filterByStatus('To Read')"
                  >
                    To Read
                  </button>
                  <button
                    class="btn btn-outline-secondary btn-sm"
                    onclick="filterByStatus('Currently Reading')"
                  >
                    Reading
                  </button>
                  <button
                    class="btn btn-outline-secondary btn-sm"
                    onclick="filterByStatus('Completed')"
                  >
                    Done
                  </button>
                </div>
              </div>
            </div>
            <div class="row" id="booksGrid"></div>
          </div>

          <!-- Dashboard, Goals, Borrowed sections remain similar but styled for dark -->
          <div id="dashboard-section" class="section d-none">
            <h2 class="text-light pt-4">Dashboard</h2>
            <div class="row mt-4 g-3">
              <div class="col-md-4">
                <div class="card bg-dark text-light">
                  <div class="card-body text-center">
                    <h5>Books Read</h5>
                    <h2 id="booksReadCount" class="text-success">0</h2>
                  </div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="card bg-dark text-light">
                  <div class="card-body text-center">
                    <h5>Currently Reading</h5>
                    <h2 id="currentReadingCount" class="text-primary">0</h2>
                  </div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="card bg-dark text-light">
                  <div class="card-body text-center">
                    <h5>Total Books</h5>
                    <h2 id="totalBooksCount" class="text-info">0</h2>
                  </div>
                </div>
              </div>
            </div>
            <div class="card bg-dark text-light mt-4">
              <div class="card-body">
                <h5>Yearly Goal Progress</h5>
                <div class="progress mb-3" style="height: 28px">
                  <div
                    id="goalProgressBar"
                    class="progress-bar bg-success"
                    style="width: 0%"
                  >
                    0%
                  </div>
                </div>
                <div class="d-flex justify-content-between">
                  <span id="goalProgressText">0 / 20</span>
                  <span id="goalYear">2026</span>
                </div>
              </div>
            </div>
          </div>

          <div id="goals-section" class="section d-none">
            <h2 class="text-light pt-4">Reading Goals</h2>
            <div class="card bg-dark text-light mt-4">
              <div class="card-body">
                <h5>Set Yearly Goal</h5>
                <div class="input-group">
                  <input
                    type="number"
                    id="yearlyGoalInput"
                    class="form-control bg-dark text-light"
                    value="20"
                  />
                  <button class="btn btn-primary" onclick="setYearlyGoal()">
                    Save
                  </button>
                </div>
                <div id="goalsStats" class="mt-4"></div>
              </div>
            </div>
          </div>

          <div id="borrowed-section" class="section d-none">
            <h2 class="text-light pt-4">Borrowed &amp; Lent</h2>
            <div class="row mt-4 g-4">
              <div class="col-md-6">
                <h5 class="text-light">Borrowed</h5>
                <div id="borrowedList" class="list-group"></div>
              </div>
              <div class="col-md-6">
                <h5 class="text-light">Lent</h5>
                <div id="lentList" class="list-group"></div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- Book Modal -->
    <div class="modal fade" id="bookModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" id="modalTitle">Add Book</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="bookForm">
              <input type="hidden" id="bookId" />
              <div class="mb-3">
                <label>Title</label>
                <input
                  type="text"
                  class="form-control bg-dark text-light"
                  id="bookTitle"
                  required
                />
              </div>
              <div class="mb-3">
                <label>Author</label>
                <input
                  type="text"
                  class="form-control bg-dark text-light"
                  id="bookAuthor"
                  required
                />
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label>Genre</label>
                  <select class="form-select bg-dark text-light" id="bookGenre">
                    <option value="Fiction">Fiction</option>
                    <option value="Non-Fiction">Non-Fiction</option>
                    <option value="Mystery">Mystery</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Biography">Biography</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label>Status</label>
                  <select
                    class="form-select bg-dark text-light"
                    id="bookStatus"
                  >
                    <option value="To Read">To Read</option>
                    <option value="Currently Reading">Currently Reading</option>
                    <option value="Completed">Completed</option>
                  </select>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label>Ownership</label>
                  <select
                    class="form-select bg-dark text-light"
                    id="bookOwnership"
                  >
                    <option value="Owned">Owned</option>
                    <option value="Borrowed">Borrowed</option>
                    <option value="Lent">Lent</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label>Person</label>
                  <input
                    type="text"
                    class="form-control bg-dark text-light"
                    id="bookPerson"
                    placeholder="Name"
                  />
                </div>
              </div>
              <div class="mb-3">
                <label>Rating (if completed)</label>
                <select class="form-select bg-dark text-light" id="bookRating">
                  <option value="0">No Rating</option>
                  <option value="5">★★★★★</option>
                  <option value="4">★★★★</option>
                  <option value="3">★★★</option>
                  <option value="2">★★</option>
                  <option value="1">★</option>
                </select>
              </div>
              <div class="mb-3">
                <label>Notes</label>
                <textarea
                  class="form-control bg-dark text-light"
                  id="bookNotes"
                  rows="3"
                ></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer border-secondary">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-primary" onclick="saveBook()">
              Save
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
