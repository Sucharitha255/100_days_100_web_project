<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Vision Board</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container-fluid p-0">
      <!-- Navbar -->
      <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
          <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-eye-fill"></i> Vision Board
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <button
                  class="btn btn-outline-light btn-sm me-2"
                  onclick="clearBoard()"
                >
                  <i class="bi bi-trash3"></i> Clear Board
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="btn btn-outline-light btn-sm me-2"
                  onclick="exportBoard()"
                >
                  <i class="bi bi-download"></i> Export
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="btn btn-outline-light btn-sm"
                  onclick="randomizeLayout()"
                >
                  <i class="bi bi-shuffle"></i> Randomize
                </button>
              </li>
            </ul>
            <button
              class="btn btn-primary"
              data-bs-toggle="modal"
              data-bs-target="#addItemModal"
            >
              <i class="bi bi-plus-circle"></i> Add New Item
            </button>
          </div>
        </div>
      </nav>

      <div class="row h-100 g-0">
        <!-- Sidebar -->
        <div class="col-lg-2 col-md-3 sidebar p-3">
          <h5 class="mb-3 text-light"><i class="bi bi-tags"></i> Categories</h5>
          <div id="categoryList" class="d-flex flex-column gap-1"></div>

          <hr class="border-secondary" />
          <div class="mt-4">
            <h6 class="text-light">Board Stats</h6>
            <p class="small text-muted mb-1">
              Total Items:
              <span id="totalItems" class="fw-bold text-white">0</span>
            </p>
            <p class="small text-muted">
              Last Saved:
              <span id="lastSaved" class="fw-bold text-white">Never</span>
            </p>
          </div>
        </div>

        <!-- Vision Board Canvas -->
        <div
          class="col-lg-10 col-md-9 p-0 position-relative"
          id="board-container"
        >
          <div id="visionBoard" class="vision-board"></div>

          <!-- Empty State -->
          <div
            id="emptyState"
            class="empty-state position-absolute top-50 start-50 translate-middle text-center"
          >
            <i class="bi bi-image-fill display-1 mb-3"></i>
            <h3 class="text-light">Your Vision Board is Empty</h3>
            <p class="text-muted">
              Add goals, quotes, images, and notes to visualize your dreams
            </p>
            <button
              class="btn btn-primary btn-lg mt-3"
              data-bs-toggle="modal"
              data-bs-target="#addItemModal"
            >
              <i class="bi bi-plus-circle"></i> Start Building
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Add/Edit Item Modal -->
    <div
      class="modal fade"
      id="addItemModal"
      tabindex="-1"
      aria-labelledby="modalTitle"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Add New Item</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="itemForm">
              <div class="mb-3">
                <label class="form-label">Type</label>
                <div class="btn-group w-100" role="group">
                  <input
                    type="radio"
                    class="btn-check"
                    name="itemType"
                    id="typeGoal"
                    value="goal"
                    checked
                  />
                  <label class="btn btn-outline-light" for="typeGoal"
                    >Goal</label
                  >

                  <input
                    type="radio"
                    class="btn-check"
                    name="itemType"
                    id="typeQuote"
                    value="quote"
                  />
                  <label class="btn btn-outline-light" for="typeQuote"
                    >Quote</label
                  >

                  <input
                    type="radio"
                    class="btn-check"
                    name="itemType"
                    id="typeNote"
                    value="note"
                  />
                  <label class="btn btn-outline-light" for="typeNote"
                    >Note</label
                  >

                  <input
                    type="radio"
                    class="btn-check"
                    name="itemType"
                    id="typeImage"
                    value="image"
                  />
                  <label class="btn btn-outline-light" for="typeImage"
                    >Image</label
                  >
                </div>
              </div>

              <div class="mb-3">
                <label for="itemTitle" class="form-label">Title / Goal</label>
                <input
                  type="text"
                  class="form-control"
                  id="itemTitle"
                  placeholder="What do you want to achieve?"
                />
              </div>

              <div class="mb-3">
                <label for="itemCategory" class="form-label">Category</label>
                <select class="form-select" id="itemCategory">
                  <option value="Career">Career</option>
                  <option value="Fitness">Fitness</option>
                  <option value="Education">Education</option>
                  <option value="Travel">Travel</option>
                  <option value="Finance">Finance</option>
                  <option value="Personal">Personal Growth</option>
                  <option value="Health">Health</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="itemContent" class="form-label"
                  >Description / Quote / Note</label
                >
                <textarea
                  class="form-control"
                  id="itemContent"
                  rows="3"
                  placeholder="Write your vision here..."
                ></textarea>
              </div>

              <div class="mb-3" id="imageUploadGroup">
                <label class="form-label">Upload Image</label>
                <input
                  type="file"
                  class="form-control"
                  id="itemImage"
                  accept="image/*"
                />
                <div id="imagePreview" class="mt-2 text-center d-none">
                  <img src="" alt="Preview" class="img-fluid rounded" />
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-success" onclick="saveItem()">
              Save Item
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
