<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">Crypto Price Tracker</h1>
            <p class="subtitle">Real-time cryptocurrency prices powered by CoinGecko</p>
        </header>
        
        <div class="search-section">
            <div class="search-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" id="search" placeholder="Search cryptocurrency by name or symbol..." aria-label="Search cryptocurrency">
            </div>
        </div>

        <div id="crypto-grid" class="grid"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
