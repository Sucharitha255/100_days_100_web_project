<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASHCARD QUIZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>FLASHCARD QUIZ</h1>

    <div class="card">

        <h2 id="question"></h2>

        <input
            type="text"
            id="userAnswer"
            placeholder="Type your answer here">

        <div class="quiz-buttons">
            <button id="checkBtn">Check Answer</button>
            <button id="showBtn">Show Answer</button>
        </div>

        <p id="result"></p>

        <p id="answer" class="hidden"></p>

    </div>

    <div class="navigation">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <hr>

    <h2>Add / Edit Flashcard</h2>

    <input
        type="text"
        id="questionInput"
        placeholder="Enter Question">

    <textarea
        id="answerInput"
        placeholder="Enter Answer"></textarea>

    <div class="buttons">
        <button id="addBtn">Add Flashcard</button>
        <button id="editBtn">Edit Current</button>
        <button id="deleteBtn">Delete Current</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
