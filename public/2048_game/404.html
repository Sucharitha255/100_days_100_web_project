<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Not Found | 2048 Game</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Nunito", sans-serif;
        background: linear-gradient(135deg, #1f2937, #111827);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      .box {
        max-width: 500px;
        padding: 30px;
      }

      h1 {
        font-size: 6rem;
        margin: 0;
        color: #fbbf24;
      }

      h2 {
        margin: 10px 0;
        font-size: 1.8rem;
      }

      p {
        opacity: 0.8;
        margin-bottom: 20px;
      }

      .btn {
        display: inline-block;
        padding: 12px 20px;
        background: #4f46e5;
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.2s;
      }

      .btn:hover {
        background: #4338ca;
        transform: scale(1.05);
      }

      .tile {
        font-size: 2rem;
        margin: 15px 0;
        opacity: 0.6;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <div class="tile">🎮 2048</div>
      <h1>404</h1>
      <h2>Tile Not Found</h2>
      <p>
        The page you're looking for doesn't exist 
      </p>

      <a class="btn" href="index.html">Back to Game</a>
    </div>
  </body>
</html>
