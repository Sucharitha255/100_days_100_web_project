<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111827;
      color: white;
      font-family: Arial, sans-serif;
    }

    .card {
      padding: 2rem;
      text-align: center;
      background: #1f2937;
      border-radius: 16px;
      transform-style: preserve-3d;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: rotateY(10deg) rotateX(10deg);
    }

    a {
      display: inline-block;
      margin-top: 1rem;
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist.</p>

    <a href="./index.html">Back to 3D Cards</a>
  </div>
</body>
</html>
