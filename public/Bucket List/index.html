<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bucket List Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container-fluid">
      <!-- Header -->
      <header class="py-3 border-bottom">
        <div class="d-flex justify-content-between align-items-center px-4">
          <h1 class="h3 mb-0">Bucket List Tracker</h1>
          <div class="d-flex align-items-center gap-4">
            <div class="d-flex align-items-center gap-3">
              <div class="progress" style="width: 280px; height: 12px">
                <div
                  id="overall-progress"
                  class="progress-bar bg-success"
                  role="progressbar"
                  style="width: 0%"
                ></div>
              </div>
              <span id="progress-text" class="fw-medium text-light"
                >0% (0/0)</span
              >
            </div>
            <button
              class="btn btn-primary"
              data-bs-toggle="modal"
              data-bs-target="#addModal"
            >
              + New Goal
            </button>
          </div>
        </div>
      </header>

      <div class="row">
        <!-- Sidebar -->
        <div class="col-lg-3 col-md-4 sidebar">
          <div class="p-4">
            <h5 class="mb-3">Statistics</h5>
            <div id="stats" class="mb-4"></div>

            <h5 class="mb-3">Filters</h5>

            <div class="mb-3">
              <input
                type="text"
                id="search-input"
                class="form-control"
                placeholder="Search goals..."
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Status</label>
              <div class="btn-group w-100" role="group">
                <input
                  type="radio"
                  class="btn-check"
                  name="status-filter"
                  id="status-all"
                  value="all"
                  checked
                />
                <label class="btn btn-outline-light" for="status-all"
                  >All</label
                >
                <input
                  type="radio"
                  class="btn-check"
                  name="status-filter"
                  id="status-pending"
                  value="pending"
                />
                <label class="btn btn-outline-light" for="status-pending"
                  >Pending</label
                >
                <input
                  type="radio"
                  class="btn-check"
                  name="status-filter"
                  id="status-completed"
                  value="completed"
                />
                <label class="btn btn-outline-light" for="status-completed"
                  >Completed</label
                >
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Category</label>
              <select id="category-filter" class="form-select">
                <option value="all">All Categories</option>
                <option value="Travel">Travel</option>
                <option value="Career">Career</option>
                <option value="Fitness">Fitness</option>
                <option value="Learning">Learning</option>
                <option value="Personal">Personal</option>
                <option value="Adventure">Adventure</option>
                <option value="Finance">Finance</option>
              </select>
            </div>

            <button
              id="clear-filters"
              class="btn btn-outline-secondary w-100 mb-3"
            >
              Clear Filters
            </button>

            <div class="mt-4 pt-3 border-top">
              <div class="d-flex gap-2">
                <button
                  id="export-btn"
                  class="btn btn-outline-light flex-grow-1"
                >
                  Export JSON
                </button>
                <button
                  id="import-btn"
                  class="btn btn-outline-light flex-grow-1"
                >
                  Import JSON
                </button>
              </div>
              <input
                type="file"
                id="import-input"
                accept=".json"
                class="d-none"
              />
            </div>
          </div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-9 col-md-8 p-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0">My Bucket List</h4>
            <div class="btn-group">
              <button id="grid-view-btn" class="btn btn-outline-light active">
                Grid
              </button>
              <button id="list-view-btn" class="btn btn-outline-light">
                Compact List
              </button>
            </div>
          </div>

          <!-- Grid View (Right → Left, Top → Bottom) -->
          <div
            id="grid-view"
            class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
          ></div>

          <!-- Compact List View -->
          <div id="list-view" class="d-none">
            <div id="list-container" class="list-group"></div>
          </div>

          <div id="empty-state" class="text-center py-5 d-none">
            <h4 class="text-muted">Your bucket list is empty</h4>
            <p class="text-muted mb-0">
              Add your first goal to start tracking.
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Add / Edit Modal -->
    <div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Add New Goal</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="goal-form">
              <input type="hidden" id="edit-id" />

              <div class="row">
                <div class="col-md-8 mb-3">
                  <label class="form-label"
                    >Title <span class="text-danger">*</span></label
                  >
                  <input type="text" class="form-control" id="title" required />
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">Priority</label>
                  <select id="priority" class="form-select">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                  </select>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea
                  class="form-control"
                  id="description"
                  rows="3"
                  placeholder="Details about this goal..."
                ></textarea>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label"
                    >Category <span class="text-danger">*</span></label
                  >
                  <select id="category" class="form-select" required>
                    <option value="Travel">Travel</option>
                    <option value="Career">Career</option>
                    <option value="Fitness">Fitness</option>
                    <option value="Learning">Learning</option>
                    <option value="Personal">Personal</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Finance">Finance</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Due Date</label>
                  <input type="date" class="form-control" id="due-date" />
                </div>
              </div>

              <!-- Subtasks -->
              <div class="mb-3">
                <label class="form-label">Subtasks</label>
                <div id="subtasks-container" class="mb-2"></div>
                <button
                  type="button"
                  id="add-subtask-btn"
                  class="btn btn-sm btn-outline-light"
                >
                  + Add Subtask
                </button>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-primary" id="save-goal">
              Save Goal
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
