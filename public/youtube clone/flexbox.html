<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flexbox Demo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 20px;
      padding-bottom: 1000px;
      background-color: #f5f5f5;
    }

    .demo {
      display: flex;
      flex-direction: row;
      gap: 10px;
      margin: 30px 0;
    }

    .container {
      display: flex;
      flex-direction: row;
      align-items: center;
      height: 70px;
      padding: 10px;
      margin: 30px 0;
      border: 1px solid #999;
      gap: 10px;
      background-color: white;
    }

    .blue {
      background-color: lightblue;
      padding: 10px;
      overflow-wrap: break-word;
    }

    .pink {
      background-color: lightpink;
      padding: 10px;
      overflow-wrap: break-word;
    }

    p {
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <!-- Basic Flex -->
  <div class="demo">
    <div class="blue">
      div 1 text
    </div>

    <div class="pink">
      div 2
      <p>text</p>
    </div>
  </div>

  <!-- Fixed + Flexible -->
  <div class="demo">
    <div class="blue" style="width: 100px;">
      100px
    </div>

    <div class="pink" style="flex: 1;">
      flex: 1
    </div>
  </div>

  <!-- Multiple Flex Items -->
  <div class="demo">
    <div class="blue" style="flex: 1;">
      flex: 1
    </div>

    <div class="pink" style="width: 100px;">
      100px
    </div>

    <div class="blue" style="flex: 2;">
      flex: 2
    </div>
  </div>

  <!-- justify-content: center -->
  <div class="container" style="justify-content: center;">
    <div class="blue" style="width: 100px;">
      100px
    </div>

    <div class="pink" style="width: 100px;">
      100px
    </div>

    <div class="blue" style="width: 100px;">
      100px
    </div>
  </div>

  <!-- justify-content: space-between -->
  <div class="container" style="justify-content: space-between;">
    <div class="blue" style="width: 100px;">
      100px
    </div>

    <div class="pink" style="width: 100px;">
      100px
    </div>

    <div class="blue" style="width: 100px;">
      100px
    </div>
  </div>

  <!-- Another Example -->
  <div class="container" style="justify-content: space-between;">
    <div class="blue" style="width: 100px;">
      100px
    </div>

    <div class="pink" style="width: 100px;">
      100px
    </div>

    <div class="blue" style="width: 100px;">
      100px
    </div>
  </div>

</body>
</html>
