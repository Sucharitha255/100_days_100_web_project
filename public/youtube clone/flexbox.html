<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flexbox Practice</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      padding-bottom: 1000px;
      margin: 20px;
    }

    .demo {
      display: flex;
      flex-direction: row;
      margin-top: 30px;
      gap: 10px;
    }

    .container {
      display: flex;
      flex-direction: row;
      height: 70px;
      border: 1px solid gray;
      margin-top: 30px;
      padding: 10px;
      gap: 10px;
      align-items: center;
    }

    .blue {
      background: lightblue;
      padding: 10px;
      overflow-wrap: break-word;
    }

    .pink {
      background: lightpink;
      padding: 10px;
      overflow-wrap: break-word;
    }
  </style>
</head>

<body>

<div class="demo">
  <div class="blue">div 1 text</div>
  <div class="pink">
    div 2
    <p>text</p>
  </div>
</div>

<div class="demo">
  <div class="blue" style="width:100px;">100px</div>
  <div class="pink" style="flex:1;">flex:1</div>
</div>

<div class="demo">
  <div class="blue" style="flex:1;">flex:1</div>
  <div class="pink" style="width:100px;">100px</div>
  <div class="blue" style="flex:2;">flex:2</div>
</div>

<div class="container" style="justify-content:center;">
  <div class="blue" style="width:100px;">100px</div>
  <div class="pink" style="width:100px;">100px</div>
  <div class="blue" style="width:100px;">100px</div>
</div>

<div class="container" style="justify-content:space-between;">
  <div class="blue" style="width:100px;">100px</div>
  <div class="pink" style="width:100px;">100px</div>
  <div class="blue" style="width:100px;">100px</div>
</div>

<div class="container" style="justify-content:space-between;">
  <div class="blue" style="width:100px;">100px</div>
  <div class="pink" style="width:100px;">100px</div>
  <div class="blue" style="width:100px;">100px</div>
</div>

</body>
</html>
