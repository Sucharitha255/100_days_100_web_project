    <!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luck Or Skill Game</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
```

</head>
<body>

<div class="container py-5">

```
<div class="game-card mx-auto">

    <h1 class="text-center mb-3">🎲 Luck Or Skill</h1>

    <p class="text-center subtitle">
        Choose between safe rewards and risky opportunities.
        Reach the highest score before luck runs out.
    </p>

    <div class="stats">

        <div class="stat-box">
            <h6>Current Score</h6>
            <h2 id="score">0</h2>
        </div>

        <div class="stat-box">
            <h6>High Score</h6>
            <h2 id="highScore">0</h2>
        </div>

        <div class="stat-box">
            <h6>Lives</h6>
            <h2 id="lives">3</h2>
        </div>

    </div>

    <div class="mt-4">
        <label class="form-label">
            Risk Meter
        </label>

        <div class="progress">
            <div
                id="riskBar"
                class="progress-bar"
                role="progressbar"
                style="width: 10%;">
                10%
            </div>
        </div>
    </div>

    <div class="buttons mt-4">

        <button
            id="safeBtn"
            class="btn btn-success btn-lg">
            Safe Choice
        </button>

        <button
            id="riskBtn"
            class="btn btn-danger btn-lg">
            Risk Choice
        </button>

    </div>

    <div
        id="message"
        class="message-box mt-4">
        Start playing and test your luck!
    </div>

    <div class="text-center mt-4">

        <button
            id="restartBtn"
            class="btn btn-warning">
            Restart Game
        </button>

    </div>

</div>
```

</div>

<div
    class="modal fade"
    id="gameOverModal"
    tabindex="-1">

```
<div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

        <div class="modal-header">
            <h5 class="modal-title">
                Game Over
            </h5>
        </div>

        <div class="modal-body text-center">

            <h2 id="finalScore"></h2>

            <p>
                Better luck next time!
            </p>

        </div>

        <div class="modal-footer">

            <button
                class="btn btn-primary"
                data-bs-dismiss="modal">
                Close
            </button>

        </div>

    </div>

</div>
```

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
