<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Assistant</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <!-- particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

    <div id="particles-js"></div>

    <!-- AUTH -->
    <div id="authContainer" class="auth-container">

        <div class="auth-box">

            <!-- Toggle Signup / Login -->
            <div class="toggle-buttons">
                <button id="toggleSignup" onclick="showSignup()">Signup</button>
                <button id="toggleLogin" onclick="showLogin()">Login</button>
            </div>

            <!-- Signup -->
            <div id="signupBox">

                <h2>Create Account</h2>

                <input type="text" id="signupUsername" placeholder="Username">
                <input type="email" id="signupEmail" placeholder="Email">
                <input type="password" id="signupPassword" placeholder="Password">

                <button onclick="signup()">Create Account</button>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>or</span>
                </div>

                <!-- Google Sign Up -->
                <button class="google-btn" onclick="googleAuth()">
                    <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                    Continue with Google
                </button>

            </div>

            <!-- Login -->
            <div id="loginBox" style="display:none;">

                <h2>Login</h2>

                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">

                <button onclick="login()">Login</button>

                <p onclick="showForgot()">Forgot Password?</p>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>or</span>
                </div>

                <!-- Google Login -->
                <button class="google-btn" onclick="googleAuth()">
                    <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                    Continue with Google
                </button>

            </div>

            <!-- Forgot Password -->
            <div id="forgotBox" style="display:none;">

                <h2>Reset Password</h2>

                <input type="email" id="forgotEmail" placeholder="Email">
                <input type="password" id="newPassword" placeholder="New Password">

                <button onclick="resetPassword()">Reset Password</button>

                <p onclick="showLogin()">Back to Login</p>

            </div>

            <p id="status"></p>

        </div>

    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="main" style="display:none;">

        <button id="logoutBtn" class="logout-btn">
            Logout
        </button>

        <div class="image-container">

            <img src="giphy.gif" alt="Jarvis">

            <h1>J A R V I S</h1>

            <p>I am your Virtual Assistant</p>

        </div>

        <div class="input">

            <button class="talk">
                <i class="fas fa-microphone-alt"></i>
            </button>

            <div class="status-container">

                <h3 class="content">Click to Speak</h3>

                <span class="status-text">Idle</span>

                <div class="wave-container">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
