<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text Saver Pro</title>

<link rel="stylesheet" href="popup.css">
</head>

<body>

  <a href="https://100-days-100-web-project.vercel.app" class="back-home-btn">⬅ Back to Home</a>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <h2>Text Saver Pro</h2>
  </div>

  <span id="itemCount">0</span>
</div>

<div class="search-box">
  <input
    type="text"
    id="searchInput"
    placeholder="Search saved snippets..."
  >
</div>

<div class="stats">
  <span>Research Assistant</span>
  <span>v1.0</span>
</div>

<div id="textList"></div>

<div class="actions">
  <button id="downloadButton">
    📥 Export
  </button>

  <button id="clearButton">
    🗑 Clear
  </button>
</div>
<script src="popup.js"></script>

</body>
</html>
