<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Habit Tracker Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <header>

    <h1>🌱 Habit Tracker Pro</h1>

    <div class="header-actions">

      <input
        type="text"
        id="searchHabit"
        placeholder="Search habit..."
        aria-label="Search habit"
      >

      <button id="addHabitBtn">
        + Add Habit
      </button>

      <button id="themeBtn" aria-label="Toggle dark mode">
        🌙
      </button>

    </div>

  </header>

  <div class="stats">

    <div class="card">
      <h3>Total Habits</h3>
      <p id="totalHabits">0</p>
    </div>

    <div class="card">
      <h3>Completed Today</h3>
      <p id="completedToday">0</p>
    </div>

    <div class="card">
      <h3>Best Streak</h3>
      <p id="bestStreak">0</p>
    </div>

  </div>

  <div class="quote-box">
    <p id="quote"></p>
  </div>

  <div id="habitList"></div>

  <p id="emptyState" class="empty-state" hidden>
    No habits yet. Click <strong>+ Add Habit</strong> to start building your streak.
  </p>

</div>

<div class="modal" id="habitModal">

  <div class="modal-content">

    <div class="modal-header">
      <h2>Add Habit</h2>
      <button id="closeModalBtn" class="close-btn" aria-label="Close">✕</button>
    </div>

    <input
      type="text"
      id="habitName"
      placeholder="Habit Name"
      maxlength="60"
    >

    <select id="habitCategory">
      <option>Health</option>
      <option>Study</option>
      <option>Fitness</option>
      <option>Personal</option>
      <option>Work</option>
    </select>

    <label class="color-row" for="habitColor">
      <span>Habit color</span>
      <input
        type="color"
        id="habitColor"
        value="#22c55e"
      >
    </label>

    <textarea
      id="habitNotes"
      placeholder="Notes..."
      maxlength="200"
    ></textarea>

    <p id="formError" class="form-error" hidden>Please enter a habit name.</p>

    <button id="saveHabitBtn">
      Save Habit
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
