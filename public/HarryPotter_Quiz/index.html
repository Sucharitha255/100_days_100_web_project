<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hogwarts Quiz | Harry Potter</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container py-5">
      <!-- Header -->
      <header class="header text-center mb-5">
        <h1 class="display-4 fw-bold text-warning">
          <i class="fas fa-wand-magic-sparkles"></i> Hogwarts Quiz
        </h1>
        <p class="lead text-light">Prove your wizarding knowledge!</p>
      </header>

      <!-- START SCREEN -->
      <div id="start-screen" class="screen">
        <div class="text-center mb-5">
          <div class="sorting-hat mx-auto mb-4">🎩</div>
          <h2>Welcome, Young Witch/Wizard!</h2>
        </div>

        <!-- Player Progress -->
        <div class="progress-card mb-5">
          <div
            class="d-flex justify-content-between align-items-center flex-wrap gap-3"
          >
            <div>
              <strong>Level:</strong>
              <span id="player-level" class="text-warning fs-4">1</span>
            </div>
            <div>
              <strong>XP:</strong>
              <span id="player-xp" class="text-warning fs-4">0</span> / 1000
            </div>
            <div>
              <strong>Wizard Cards:</strong>
              <span id="player-cards" class="text-warning fs-4">0</span>/12
            </div>
          </div>
        </div>

        <div class="row justify-content-center g-4">
          <div class="col-md-4">
            <button
              onclick="startQuiz('easy')"
              class="btn btn-success btn-lg w-100 py-4 fs-5"
            >
              <i class="fas fa-feather"></i><br />Easy - O.W.L.
            </button>
          </div>
          <div class="col-md-4">
            <button
              onclick="startQuiz('medium')"
              class="btn btn-warning btn-lg w-100 py-4 fs-5"
            >
              <i class="fas fa-scroll"></i><br />Medium - N.E.W.T.
            </button>
          </div>
          <div class="col-md-4">
            <button
              onclick="startQuiz('hard')"
              class="btn btn-danger btn-lg w-100 py-4 fs-5"
            >
              <i class="fas fa-skull"></i><br />Hard - Death Eater
            </button>
          </div>
        </div>

        <div class="mt-4 text-center">
          <button
            onclick="showLeaderboard()"
            class="btn btn-outline-light me-3"
          >
            <i class="fas fa-trophy"></i> Leaderboard
          </button>
          <button onclick="showProgressModal()" class="btn btn-outline-warning">
            <i class="fas fa-chart-line"></i> My Progress
          </button>
        </div>
      </div>

      <!-- QUIZ SCREEN -->
      <div id="quiz-screen" class="screen d-none">
        <div
          class="quiz-header d-flex justify-content-between align-items-center mb-4"
        >
          <div>
            <span id="difficulty-badge" class="badge fs-6"></span>
          </div>
          <div class="text-center">
            <strong>Question <span id="current-q">1</span>/10</strong>
          </div>
          <div class="text-end">
            <i class="fas fa-fire"></i> Streak:
            <span id="streak-count" class="text-warning">0</span>
          </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress mb-4" style="height: 12px">
          <div
            id="progress-bar"
            class="progress-bar progress-bar-striped progress-bar-animated"
            style="width: 10%"
          ></div>
        </div>

        <div class="question-area mb-4">
          <h4 id="question-text" class="mb-4"></h4>
        </div>

        <div id="options-container" class="row g-3"></div>

        <!-- Timer -->
        <div class="timer mt-4 text-center">
          <i class="fas fa-hourglass-half"></i> Time Left:
          <span id="timer" class="fs-3 fw-bold text-warning">30</span>s
        </div>
      </div>

      <!-- RESULT SCREEN -->
      <div id="result-screen" class="screen d-none text-center">
        <h2 class="mb-4">Quiz Complete!</h2>
        <div id="final-score" class="display-1 fw-bold text-warning mb-3"></div>
        <p id="final-message" class="lead mb-4"></p>

        <div class="row justify-content-center mb-5">
          <div class="col-md-4">
            <div class="stat-box p-4 border border-warning rounded">
              <h5>XP Earned</h5>
              <div id="xp-earned" class="fs-1 text-success">+250</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="stat-box p-4 border border-warning rounded">
              <h5>Best Streak</h5>
              <div id="best-streak" class="fs-1 text-warning">5</div>
            </div>
          </div>
        </div>

        <button onclick="restartQuiz()" class="btn btn-lg btn-primary me-3">
          Play Again
        </button>
        <button onclick="goHome()" class="btn btn-lg btn-outline-light">
          Back to Menu
        </button>
      </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="leaderboardModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light">
          <div class="modal-header">
            <h5 class="modal-title">🏆 Hall of Fame</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body" id="leaderboard-body">
            <!-- Filled by JS -->
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
