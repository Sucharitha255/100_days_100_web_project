<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Budget Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>💰 Interactive Budget Tracker</h1>
        <button id="themeToggle">🌙</button>
    </div>

    <div class="summary">
        <div class="card">
            <h3>Total Budget</h3>
            <p id="budgetValue">₹0</p>
        </div>

        <div class="card">
            <h3>Total Spent</h3>
            <p id="spentValue">₹0</p>
        </div>

        <div class="card">
            <h3>Remaining</h3>
            <p id="remainingValue">₹0</p>
        </div>
    </div>

    <div class="budget-section">
        <input type="number" id="budgetInput" placeholder="Enter Budget">
        <button id="setBudgetBtn">Set Budget</button>
    </div>

    <div class="expense-form">
        <input type="text" id="expenseName" placeholder="Expense Name">
        <input type="number" id="expenseAmount" placeholder="Amount">
        <select id="expenseCategory">
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
        </select>
        <button id="addExpenseBtn">Add Expense</button>
    </div>

    <!-- Search and Filter Section -->
    <div class="search-filter-section">
        <div class="search-box">
            <input type="text" id="searchExpense" placeholder="🔍 Search expenses...">
        </div>
        <div class="filter-box">
            <select id="filterCategory">
                <option value="all">All Categories</option>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select>
            <select id="sortExpenses">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="highest">Highest Amount</option>
                <option value="lowest">Lowest Amount</option>
                <option value="az">A-Z</option>
                <option value="za">Z-A</option>
            </select>
        </div>
    </div>

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <div class="expense-header">
        <h2>Expense List</h2>
        <span id="expenseCount">0 expenses</span>
    </div>
    <div id="expenseList"></div>

    <h2>Category Analytics</h2>
    <canvas id="expenseChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
