<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive sandbox demonstrating real-time search debouncing, efficient DOM element caching, and high-performance event delegation." />
    <title>Performance Optimization Sandbox | Web Utility Playground</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="sandbox-card">
        <header>
            <h1>Performance Optimization Sandbox</h1>
            <p class="subtitle">Real-time Debouncing & Event Delegation Demo</p>
        </header>

        <section class="input-group">
            <input type="text" id="search-box" placeholder="Type fast to test debouncing...">
        </section>

        <section class="status-container">
            <span class="status-indicator pulse"></span>
            <span id="status-log">Status: Idle</span>
        </section>

        <section>
            <h3>Optimized List (Event Delegation)</h3>
            <div id="parent-list" class="list-container">
                <div class="item" data-id="1">Click Item 1</div>
                <div class="item" data-id="2">Click Item 2</div>
                <div class="item" data-id="3">Click Item 3</div>
            </div>
        </section>
    </main>

    <script type="module" src="demo.js"></script>
</body>

</html>
