<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading List Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📚 Reading List Tracker</h1>
        <button class="btn btn-dark" id="themeBtn">
            Dark Mode
        </button>
    </div>

    <div class="card p-4 mb-4">

        <input type="text" id="title" class="form-control mb-2" placeholder="Book Title">

        <input type="text" id="author" class="form-control mb-2" placeholder="Author">

        <input type="text" id="genre" class="form-control mb-2" placeholder="Genre">

        <select id="status" class="form-select mb-2">
            <option>To Read</option>
            <option>Reading</option>
            <option>Completed</option>
        </select>

        <input type="number" id="progress" class="form-control mb-3"
            placeholder="Progress %" min="0" max="100">

        <button class="btn btn-primary" onclick="addBook()">
            Add Book
        </button>
    </div>

    <div class="row mb-4">
        <div class="col-md-6">
            <input type="text" id="search"
                class="form-control"
                placeholder="Search books">
        </div>

        <div class="col-md-6">
            <select id="filter" class="form-select">
                <option value="all">All Genres</option>
            </select>
        </div>
    </div>

    <div class="row text-center mb-4">

        <div class="col-md-4">
            <div class="card p-3">
                <h3 id="total">0</h3>
                <p>Total Books</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h3 id="reading">0</h3>
                <p>Reading</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h3 id="completed">0</h3>
                <p>Completed</p>
            </div>
        </div>

    </div>

    <div class="row" id="bookList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
