<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="../favv.png" type="image/x-icon" />
</head>
<body>
<a href="/" class="project-back-button">← Back to Home</a>

  <div class="box1">
    <h1>Ball Bat Stump Game</h1>
    
    <div class="buttons-container">
      <button class="game_buttons" onclick="playRound('Bat')">
        <img src="bat.jpeg" class="game_image" alt="Bat button">
      </button>

      <button class="game_buttons" onclick="playRound('Ball')">
        <img src="ball.jpeg" class="game_image" alt="Ball button">
      </button>

      <button class="game_buttons" onclick="playRound('stump')">
        <img src="wickets.jpeg" class="game_image" alt="Wickets button">
      </button>
    </div>

    <!-- Matchup Selection display -->
    <div class="show">
      <div class="matchup-container">
        <div id="user-move" class="move-selection"></div>
        <div class="vs-divider">VS</div>
        <div id="computer-move" class="move-selection"></div>
      </div>

      <div id="result"></div>
      <div id="score"></div>
    </div>

    <!--Reset Button Working -->
    <button onclick="handleResetButton()" id="reset">RESET</button>
  </div>

  

<!-- added script -->
<script src="script.js"></script>  
  
</body>
</html>
