<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Solar System Explorer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="temp_style.css">
</head>

<body>

  <!-- Star Background -->
  <div class="starfield"></div>

  <!-- Header -->
  <header class="header">

    <div class="title">
      <h1>☀ Solar System</h1>
      <h2>Explorer</h2>
    </div>

    <div class="search-box">
      <input type="text" id="planetSearch" placeholder="Search planet...">

      <button id="searchBtn">
        <i class="fa-solid fa-search"></i>
      </button>
    </div>

  </header>


  <div class="app">

    <!-- LEFT PANEL -->
    <aside class="info-panel">

      <h2>
        <i class="fa-solid fa-circle-info"></i>
        Info Panel
      </h2>

      <div class="planet-info">

        <h3 id="planetName">Earth</h3>

        <p>
          <strong>Type:</strong>
          <span id="planetType">Planet</span>
        </p>

        <p>
          <strong>Radius:</strong>
          <span id="planetRadius">6371 km</span>
        </p>

        <p>
          <strong>Distance:</strong>
          <span id="planetDistance">
            149.6 Million km
          </span>
        </p>

        <p>
          <strong>Moons:</strong>
          <span id="planetMoons">1</span>
        </p>

        <button id="moreInfoBtn">
          More Info
        </button>

      </div>

    </aside>



    <!-- VIEWPORT -->
    <main class="viewport">

      <div class="camera">

        <div class="universe">

          <!-- Orbit paths -->
          <div class="orbit mercury-orbit"></div>
          <div class="orbit venus-orbit"></div>
          <div class="orbit earth-orbit"></div>
          <div class="orbit mars-orbit"></div>
          <div class="orbit asteroid-belt"></div>
          <div class="orbit jupiter-orbit"></div>
          <div class="orbit saturn-orbit"></div>
          <div class="orbit uranus-orbit"></div>
          <div class="orbit neptune-orbit"></div>

          <!-- SUN -->
          <div class="sun" tabindex="0">
            <span class="label">Sun</span>
          </div>

          <!-- MERCURY -->
          <div class="orbit-container mercury-container">

            <div class="planet mercury" data-name="Mercury" tabindex="0" id="planet">

              <span class="label">
                Mercury
              </span>

            </div>

          </div>


          <!-- VENUS -->
          <div class="orbit-container venus-container">

            <div class="planet venus" data-name="Venus" tabindex="0">

              <span class="label">
                Venus
              </span>

            </div>

          </div>


          <!-- EARTH -->
          <div class="orbit-container earth-container">

            <div class="planet earth" data-name="Earth" tabindex="0">

              <span class="label">
                Earth
              </span>

              <!-- Moon -->
              <div class="moon-orbit">

                <div class="moon">

                </div>

              </div>

            </div>

          </div>


          <!-- MARS -->
          <div class="orbit-container mars-container">

            <div class="planet mars" data-name="Mars" tabindex="0">

              <span class="label">
                Mars
              </span>

            </div>

          </div>


          <!-- ASTEROID BELT -->
          <div class="asteroids">

          </div>


          <!-- JUPITER -->
          <div class="orbit-container jupiter-container">

            <div class="planet jupiter" data-name="Jupiter" tabindex="0">

              <span class="label">
                Jupiter
              </span>

            </div>

          </div>


          <!-- SATURN -->
          <div class="orbit-container saturn-container">

            <div class="planet saturn" data-name="Saturn" tabindex="0">

              <div class="rings"></div>

              <span class="label">
                Saturn
              </span>

            </div>

          </div>


          <!-- URANUS -->
          <div class="orbit-container uranus-container">

            <div class="planet uranus" data-name="Uranus" tabindex="0">

              <span class="label">
                Uranus
              </span>

            </div>

          </div>


          <!-- NEPTUNE -->
          <div class="orbit-container neptune-container">

            <div class="planet neptune" data-name="Neptune" tabindex="0">

              <span class="label">
                Neptune
              </span>

            </div>

          </div>

    </main>


  </div>


  <!-- CONTROLS -->
<footer class="controls">

    <div class="speed-controls">

        <h3>Orbit Speed</h3>

        <button class="speed-btn" data-speed="slow">
            Slow
        </button>

        <button class="speed-btn active" data-speed="normal">
            Normal
        </button>

        <button class="speed-btn" data-speed="fast">
            Fast
        </button>

    </div>



    <div class="zoom-controls">

        <label>Zoom</label>

        <input
            type="range"
            id="zoomSlider"
            min="50"
            max="300"
            value="100">

    </div>



    <div class="actions">

        <button id="pauseBtn">
            <i class="fa-solid fa-pause"></i>
            Pause
        </button>

        <button id="playBtn">
            <i class="fa-solid fa-play"></i>
            Play
        </button>

        <button id="toggleOrbitBtn">
            Show / Hide Orbits
        </button>

        <button id="toggleLabelsBtn">
            Labels
        </button>

        <button id="viewToggleBtn">
            2D / 3D
        </button>

        <button id="themeBtn">
            Dark / Light
        </button>

    </div>

</footer>



<!-- MODAL -->
<div class="planet-modal">

    <div class="modal-content">

        <button class="close-modal">
            ×
        </button>

        <h2 id="modalPlanetName">
            Earth
        </h2>

        <p id="modalPlanetDescription">
            Planet information will appear here.
        </p>

    </div>

</div>



<!-- ACCESSIBILITY -->
<div class="accessibility-controls">

    <label>

        <input
            type="checkbox"
            id="reduceMotion">

        Reduced Motion

    </label>

</div>



<script src="script.js"></script>

</body>
</html>
